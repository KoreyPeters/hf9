{% extends "base.html" %}
{% block title %}Sign up — Human Flourishing{% endblock %}
{% block content %}
<main style="max-width:560px;margin:4rem auto;padding:0 1.5rem;font-family:system-ui,sans-serif">
  <h1 style="font-family:Georgia,serif;font-weight:normal;margin-bottom:.5rem">Create your account</h1>
  <p style="color:#555;margin-bottom:1.5rem">Join Human Flourishing to start tracking your progress.</p>

  {% if error %}
  <p style="color:#c00;margin-bottom:1rem">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div style="margin-bottom:1rem">
      <label for="id_display_name" style="display:block;font-size:.9rem;margin-bottom:.4rem">Display name</label>
      <input type="text" name="display_name" id="id_display_name" required autofocus
             style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box">
    </div>

    <div style="margin-bottom:1rem">
      <label for="id_email" style="display:block;font-size:.9rem;margin-bottom:.4rem">Email address</label>
      <input type="email" name="email" id="id_email" required value="{{ prefill_email }}"
             style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box">
    </div>

    <div style="margin-bottom:1rem">
      <label for="id_country" style="display:block;font-size:.9rem;margin-bottom:.4rem">Country <span style="color:#888;font-weight:normal">(optional)</span></label>
      <select name="jurisdiction_country" id="id_country"
              style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box">
        <option value="">Select country</option>
        <option value="US">United States</option>
        <option value="CA">Canada</option>
        <option value="GB">United Kingdom</option>
        <option value="AU">Australia</option>
        <option value="NZ">New Zealand</option>
        <option value="IE">Ireland</option>
        <option value="DE">Germany</option>
        <option value="FR">France</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div style="margin-bottom:1.5rem" id="region-group" style="display:none">
      <label for="id_region" style="display:block;font-size:.9rem;margin-bottom:.4rem">State / Province <span style="color:#888;font-weight:normal">(optional)</span></label>
      <select name="jurisdiction_region" id="id_region"
              style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box">
        <option value="">Select region</option>
      </select>
    </div>

    <button type="submit" style="width:100%;padding:.75rem;background:#1a1a1a;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer">
      Create account
    </button>
  </form>

  <p style="margin-top:1.5rem;font-size:.9rem;color:#666">
    Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>
  </p>
</main>

<script>
const regions = {
  US: [["AL","Alabama"],["AK","Alaska"],["AZ","Arizona"],["AR","Arkansas"],["CA","California"],["CO","Colorado"],["CT","Connecticut"],["DE","Delaware"],["FL","Florida"],["GA","Georgia"],["HI","Hawaii"],["ID","Idaho"],["IL","Illinois"],["IN","Indiana"],["IA","Iowa"],["KS","Kansas"],["KY","Kentucky"],["LA","Louisiana"],["ME","Maine"],["MD","Maryland"],["MA","Massachusetts"],["MI","Michigan"],["MN","Minnesota"],["MS","Mississippi"],["MO","Missouri"],["MT","Montana"],["NE","Nebraska"],["NV","Nevada"],["NH","New Hampshire"],["NJ","New Jersey"],["NM","New Mexico"],["NY","New York"],["NC","North Carolina"],["ND","North Dakota"],["OH","Ohio"],["OK","Oklahoma"],["OR","Oregon"],["PA","Pennsylvania"],["RI","Rhode Island"],["SC","South Carolina"],["SD","South Dakota"],["TN","Tennessee"],["TX","Texas"],["UT","Utah"],["VT","Vermont"],["VA","Virginia"],["WA","Washington"],["WV","West Virginia"],["WI","Wisconsin"],["WY","Wyoming"]],
  CA: [["AB","Alberta"],["BC","British Columbia"],["MB","Manitoba"],["NB","New Brunswick"],["NL","Newfoundland and Labrador"],["NS","Nova Scotia"],["NT","Northwest Territories"],["NU","Nunavut"],["ON","Ontario"],["PE","Prince Edward Island"],["QC","Quebec"],["SK","Saskatchewan"],["YT","Yukon"]],
  AU: [["ACT","Australian Capital Territory"],["NSW","New South Wales"],["NT","Northern Territory"],["QLD","Queensland"],["SA","South Australia"],["TAS","Tasmania"],["VIC","Victoria"],["WA","Western Australia"]],
};

const countryEl = document.getElementById("id_country");
const regionGroup = document.getElementById("region-group");
const regionEl = document.getElementById("id_region");

function updateRegions() {
  const c = countryEl.value;
  const list = regions[c];
  regionEl.innerHTML = '<option value="">Select region</option>';
  if (list) {
    regionGroup.style.display = "";
    list.forEach(([v, l]) => {
      const o = document.createElement("option");
      o.value = v; o.textContent = l;
      regionEl.appendChild(o);
    });
  } else {
    regionGroup.style.display = "none";
  }
}

countryEl.addEventListener("change", updateRegions);

const lang = navigator.language || "";
const detected = lang.split("-")[1] || "";
if (detected && countryEl.querySelector(`option[value="${detected}"]`)) {
  countryEl.value = detected;
  updateRegions();
}
</script>
{% endblock %}
