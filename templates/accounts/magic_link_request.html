{% extends "base.html" %}
{% block title %}Magic link — Human Flourishing{% endblock %}
{% block content %}
<main style="max-width:480px;margin:4rem auto;padding:0 1.5rem;font-family:system-ui,sans-serif">
  <h1 style="font-family:Georgia,serif;font-weight:normal;margin-bottom:.5rem">Email magic link</h1>
  <p style="color:#555;margin-bottom:1.5rem">Enter your email and we'll send you a login link — no password needed.</p>

  {% if error %}
  <p style="color:#c00;margin-bottom:1rem">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label for="id_email" style="display:block;font-size:.9rem;margin-bottom:.4rem">Email address</label>
    <input type="email" name="email" id="id_email" required autofocus
           style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box">
    <button type="submit" style="margin-top:1rem;width:100%;padding:.75rem;background:#1a1a1a;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer">
      Send magic link
    </button>
  </form>

  <p style="margin-top:1.5rem;font-size:.9rem;color:#666">
    <a href="{% url 'accounts:login' %}">← Back to login</a>
  </p>
</main>
{% endblock %}
