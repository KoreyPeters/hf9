services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hf
      POSTGRES_USER: hf
      POSTGRES_PASSWORD: hf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
